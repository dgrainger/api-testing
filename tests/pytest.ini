[pytest]
addopts = -vv -s -rA --color=yes --html=reports/test-report.html --self-contained-html
markers = 
    httpbin: these are test that run against httpbin.org
    petstore: these are tests that run against petstore.swagger.io
    smoke: these are smoke tests
testpaths = tests
python_files = test_*.py tests_*.py
python_functions = test_*
